<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — MDR Surveillance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#090514 0%,#1e1b4b 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.auth-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.45);}
.brand{text-align:center;margin-bottom:28px;}
.brand-icon{width:60px;height:60px;background:linear-gradient(135deg,#4f46e5,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#fff;margin:0 auto 12px;box-shadow:0 8px 16px rgba(99,102,241,0.25);}
.brand h2{font-size:1.3rem;font-weight:700;color:#1e1b4b;}
.brand p{color:#6b7280;font-size:.875rem;}
.form-label{font-weight:600;font-size:.85rem;color:#374151;}
.form-control,.form-select{border-radius:10px;border:1.5px solid #e5e7eb;padding:10px 14px;}
.form-control:focus,.form-select:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.btn-login{background:linear-gradient(135deg,#4f46e5,#8b5cf6);border:none;border-radius:10px;padding:12px;font-weight:600;width:100%;box-shadow:0 4px 12px rgba(99,102,241,0.25);}
.btn-login:hover{box-shadow:0 4px 18px rgba(99,102,241,0.45);transform:translateY(-1px);}
.role-tabs{display:flex;gap:8px;margin-bottom:20px;}
.role-tab{flex:1;padding:8px;border:1.5px solid #e5e7eb;border-radius:10px;text-align:center;cursor:pointer;font-size:.8rem;font-weight:600;color:#6b7280;transition:.2s;}
.role-tab.active{border-color:#6366f1;background:#f5f3ff;color:#6366f1;}
.alert{border-radius:10px;font-size:.875rem;}
.signup-link{text-align:center;margin-top:16px;font-size:.875rem;color:#6b7280;}
.signup-link a{color:#6366f1;font-weight:600;}
</style>
</head>
<body>
<div class="auth-card">
  <div class="brand">
    <div class="brand-icon"><i class="fa fa-shield-virus"></i></div>
    <h2>MDR Surveillance</h2>
    <p>Sign in to your account</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'success' if cat=='success' else 'danger' if cat=='danger' else 'warning' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Select Role</label>
      <div class="role-tabs">
        <div class="role-tab" onclick="setRole('admin',this)"><i class="fa fa-shield-alt me-1"></i>Admin</div>
        <div class="role-tab active" onclick="setRole('doctor',this)"><i class="fa fa-user-md me-1"></i>Doctor</div>
        <div class="role-tab" onclick="setRole('user',this)"><i class="fa fa-user me-1"></i>User</div>
      </div>
      <input type="hidden" name="role" id="roleInput" value="doctor"/>
    </div>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <div class="input-group">
        <span class="input-group-text" style="border-radius:10px 0 0 10px;border:1.5px solid #e5e7eb;border-right:0;background:#f9fafb;"><i class="fa fa-user text-muted"></i></span>
        <input type="text" class="form-control" name="username" placeholder="Enter username" required style="border-radius:0 10px 10px 0;"/>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text" style="border-radius:10px 0 0 10px;border:1.5px solid #e5e7eb;border-right:0;background:#f9fafb;"><i class="fa fa-lock text-muted"></i></span>
        <input type="password" class="form-control" name="password" id="passwordInput" placeholder="Enter password" required style="border-radius:0 10px 10px 0;"/>
        <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()" style="border-radius:0 10px 10px 0;border:1.5px solid #e5e7eb;border-left:0;"><i class="fa fa-eye" id="eyeIcon"></i></button>
      </div>
    </div>

    <button type="submit" class="btn btn-login text-white"><i class="fa fa-sign-in-alt me-2"></i>Sign In</button>
  </form>

  <div class="signup-link">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a></div>
  <div class="signup-link mt-1"><a href="{{ url_for('auth.landing') }}"><i class="fa fa-arrow-left me-1"></i>Back to Home</a></div>
</div>

<script>
function setRole(role, el){
  document.getElementById('roleInput').value = role;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}
function togglePwd(){
  const inp = document.getElementById('passwordInput');
  const ico = document.getElementById('eyeIcon');
  if(inp.type==='password'){inp.type='text';ico.className='fa fa-eye-slash';}
  else{inp.type='password';ico.className='fa fa-eye';}
}
</script>
</body>
</html>
